<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F172A" />
    <title>AQUA — Offline</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #0F172A;
        color: #F8FAFC;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .wrap { padding: 24px; max-width: 360px; }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { font-size: 0.9rem; opacity: 0.7; margin: 0 0 20px; line-height: 1.5; }
      button {
        background: #F8FAFC;
        color: #0F172A;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>You're offline</h1>
      <p>AQUA can't reach the network right now. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
