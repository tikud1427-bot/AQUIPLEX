    <!--
      Theme bootstrap: runs before first paint so there is never a flash of
      the wrong theme. Mirrors the resolution logic in
      src/providers/ThemeProvider.tsx — keep both in sync.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('aqua-settings');
          var theme = 'system';
          if (stored) {
            var parsed = JSON.parse(stored);
            theme = (parsed && parsed.state && parsed.state.theme) || 'system';
          }
          var resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme;
          document.documentElement.classList.add(resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
